sentence=ILI9341 display + XPT2046 touch driver for the CYD ESP32-2432S028
paragraph=Self-contained display and resistive-touch driver for the "Cheap Yellow Display" ESP32-2432S028 board. Drives the ILI9341 240x320 SPI panel via the ESP-IDF SPI master driver and reads the XPT2046 resistive touch controller on its own SPI pins. Ships LVGL 9.3 examples (a hand-written Claude Code stub and a SquareLine Studio launcher) with display, touch, and LVGL plumbing already wired up.
